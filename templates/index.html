<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Captioning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Image Captioning</h1>
        <form method="post" enctype="multipart/form-data" class="mb-5 p-4 border rounded bg-light shadow">
            <div class="mb-3">
                <label for="image" class="form-label">Upload Image:</label>
                <input type="file" name="image" id="image" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Generate Caption</button>
        </form>

        {% if caption and caption_ar %}
        <div>
            <h2 class="text-success">Generated Captions</h2>
            <div class="card mt-3">
                <div class="card-body">
                    <h4>English Caption:</h4>
                    <p>{{ caption }}</p>
                    <audio controls class="w-100">
                        <source src="/static/{{ en_audio_path }}" type="audio/mp3">
                    </audio>
                </div>
            </div>
            <div class="card mt-3">
                <div class="card-body">
                    <h4>Arabic Caption:</h4>
                    <p>{{ caption_ar }}</p>
                    <audio controls class="w-100">
                        <source src="/static/{{ ar_audio_path }}" type="audio/mp3">
                    </audio>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
